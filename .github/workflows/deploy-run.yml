name: Build & Run Spring Boot Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests -B

      - name: Build Docker image
        run: docker build -t spring-app:latest .

      - name: Run Docker container
        run: |
          docker run -d \
            --name spring-app \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            spring-app:latest

      - name: Wait for app to start
        run: |
          echo "Waiting for Spring Boot to start..."
          for i in {1..15}; do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "App is up!"
              exit 0
            fi
            sleep 3
          done
          echo "App failed to start" && docker logs spring-app && exit 1

      - name: Run smoke tests (optional)
        run: |
          curl -sf http://localhost:8080/actuator/health | grep '"status":"UP"'

      - name: Stop container
        if: always()
        run: docker rm -f spring-app || true
